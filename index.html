<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus & Mood Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: rgba(0,0,0,0.3);
    padding: 25px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  h1 {
    margin-bottom: 10px;
  }

  .clock {
    font-size: 24px;
    margin-bottom: 15px;
  }

  .moods span {
    font-size: 30px;
    cursor: pointer;
    margin: 5px;
    transition: transform 0.2s;
  }

  .moods span:hover {
    transform: scale(1.2);
  }

  input {
    padding: 8px;
    width: 70%;
    border-radius: 5px;
    border: none;
    margin-top: 10px;
  }

  button {
    padding: 8px 12px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background: #00c9a7;
    color: white;
    cursor: pointer;
  }

  .progress-bar {
    margin-top: 15px;
    background: #ddd;
    border-radius: 10px;
    overflow: hidden;
    height: 20px;
  }

  .progress {
    height: 100%;
    width: 0%;
    background: #00c9a7;
  }

  .saved {
    margin-top: 10px;
    font-size: 14px;
    color: #cfcfcf;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Focus Dashboard</h1>

  <div class="clock" id="clock"></div>

  <h3>How are you feeling?</h3>
  <div class="moods">
    <span onclick="setMood('😊')">😊</span>
    <span onclick="setMood('😐')">😐</span>
    <span onclick="setMood('😢')">😢</span>
  </div>

  <div id="selectedMood"></div>

  <h3>Today's Focus Goal</h3>
  <input type="text" id="goalInput" placeholder="Enter goal">
  <br>
  <button onclick="saveGoal()">Save Goal</button>

  <div class="saved" id="goalDisplay"></div>

  <button onclick="completeGoal()">Mark as Done</button>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<script>
  // CLOCK
  function updateClock() {
    const now = new Date();
    document.getElementById("clock").innerText =
      now.toLocaleTimeString();
  }
  setInterval(updateClock, 1000);

  // MOOD
  function setMood(mood) {
    localStorage.setItem("mood", mood);
    document.getElementById("selectedMood").innerText =
      "Mood: " + mood;
  }

  // SAVE GOAL
  function saveGoal() {
    const goal = document.getElementById("goalInput").value;
    if (!goal) return;
    localStorage.setItem("goal", goal);
    localStorage.setItem("progress", 0);
    loadData();
  }

  // COMPLETE
  function completeGoal() {
    localStorage.setItem("progress", 100);
    loadData();
  }

  // LOAD DATA
  function loadData() {
    const mood = localStorage.getItem("mood");
    const goal = localStorage.getItem("goal");
    const progress = localStorage.getItem("progress") || 0;

    if (mood)
      document.getElementById("selectedMood").innerText =
        "Mood: " + mood;

    if (goal)
      document.getElementById("goalDisplay").innerText =
        "Goal: " + goal;

    document.getElementById("progress").style.width =
      progress + "%";
  }

  loadData();
</script>

</body>
</html>
